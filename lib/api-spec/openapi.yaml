openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: leads
    description: Lead management operations
  - name: notes
    description: Lead notes operations
  - name: followups
    description: Lead follow-up operations
  - name: dashboard
    description: Dashboard and analytics operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads with filtering and pagination
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/LeadStatus"
        - name: source
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, name, email, status]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Lead deleted
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/status:
    patch:
      operationId: updateLeadStatus
      tags: [leads]
      summary: Update lead status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Add a note to a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /leads/{id}/notes/{noteId}:
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Note deleted
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/followups:
    get:
      operationId: listFollowups
      tags: [followups]
      summary: List follow-ups for a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Followup"
    post:
      operationId: createFollowup
      tags: [followups]
      summary: Schedule a follow-up for a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowupBody"
      responses:
        "201":
          description: Follow-up created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Followup"

  /leads/{id}/followups/{followupId}:
    patch:
      operationId: updateFollowup
      tags: [followups]
      summary: Update a follow-up (e.g. mark complete)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: followupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFollowupBody"
      responses:
        "200":
          description: Follow-up updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Followup"
    delete:
      operationId: deleteFollowup
      tags: [followups]
      summary: Delete a follow-up
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: followupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Follow-up deleted

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/pipeline:
    get:
      operationId: getPipeline
      tags: [dashboard]
      summary: Get leads grouped by status for pipeline view
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pipeline data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineData"

  /dashboard/upcoming-followups:
    get:
      operationId: getUpcomingFollowups
      tags: [dashboard]
      summary: Get upcoming follow-ups across all leads
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Upcoming follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowupWithLead"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - name
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, agent]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - createdAt

    LeadStatus:
      type: string
      enum: [new, contacted, qualified, proposal, converted, lost]

    Lead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        source:
          type: string
        status:
          $ref: "#/components/schemas/LeadStatus"
        value:
          type: number
          nullable: true
        assignedTo:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        notesCount:
          type: integer
        followupsCount:
          type: integer
      required:
        - id
        - name
        - email
        - source
        - status
        - createdAt
        - updatedAt
        - notesCount
        - followupsCount

    LeadDetail:
      allOf:
        - $ref: "#/components/schemas/Lead"
        - type: object
          properties:
            notes:
              type: array
              items:
                $ref: "#/components/schemas/Note"
            followups:
              type: array
              items:
                $ref: "#/components/schemas/Followup"
          required:
            - notes
            - followups

    LeadListResponse:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - leads
        - total
        - page
        - limit
        - totalPages

    CreateLeadBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        source:
          type: string
        status:
          $ref: "#/components/schemas/LeadStatus"
        value:
          type: number
      required:
        - name
        - email
        - source

    UpdateLeadBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        source:
          type: string
        status:
          $ref: "#/components/schemas/LeadStatus"
        value:
          type: number
        assignedTo:
          type: integer

    UpdateLeadStatusBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
      required:
        - status

    Note:
      type: object
      properties:
        id:
          type: integer
        leadId:
          type: integer
        content:
          type: string
        authorId:
          type: integer
        authorName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - leadId
        - content
        - authorId
        - authorName
        - createdAt

    CreateNoteBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    Followup:
      type: object
      properties:
        id:
          type: integer
        leadId:
          type: integer
        description:
          type: string
        dueDate:
          type: string
          format: date-time
        completed:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - leadId
        - description
        - dueDate
        - completed
        - createdAt

    CreateFollowupBody:
      type: object
      properties:
        description:
          type: string
        dueDate:
          type: string
          format: date-time
      required:
        - description
        - dueDate

    UpdateFollowupBody:
      type: object
      properties:
        description:
          type: string
        dueDate:
          type: string
          format: date-time
        completed:
          type: boolean

    FollowupWithLead:
      allOf:
        - $ref: "#/components/schemas/Followup"
        - type: object
          properties:
            leadName:
              type: string
            leadEmail:
              type: string
          required:
            - leadName
            - leadEmail

    DashboardStats:
      type: object
      properties:
        totalLeads:
          type: integer
        newLeads:
          type: integer
        contactedLeads:
          type: integer
        convertedLeads:
          type: integer
        lostLeads:
          type: integer
        conversionRate:
          type: number
        totalPipelineValue:
          type: number
        pendingFollowups:
          type: integer
        overdueFollowups:
          type: integer
        leadsThisMonth:
          type: integer
        leadsLastMonth:
          type: integer
        statusBreakdown:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              count:
                type: integer
              percentage:
                type: number
            required:
              - status
              - count
              - percentage
        sourceBreakdown:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              count:
                type: integer
            required:
              - source
              - count
      required:
        - totalLeads
        - newLeads
        - contactedLeads
        - convertedLeads
        - lostLeads
        - conversionRate
        - totalPipelineValue
        - pendingFollowups
        - overdueFollowups
        - leadsThisMonth
        - leadsLastMonth
        - statusBreakdown
        - sourceBreakdown

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [lead_created, lead_status_changed, note_added, followup_scheduled, followup_completed]
        message:
          type: string
        leadId:
          type: integer
        leadName:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - type
        - message
        - leadId
        - leadName
        - timestamp

    PipelineStage:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
        count:
          type: integer
        value:
          type: number
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
      required:
        - status
        - count
        - value
        - leads

    PipelineData:
      type: object
      properties:
        stages:
          type: array
          items:
            $ref: "#/components/schemas/PipelineStage"
        totalValue:
          type: number
        totalLeads:
          type: integer
      required:
        - stages
        - totalValue
        - totalLeads
